spring.application.name=TicketReservation - SOEN 345
spring.config.import=optional:file:local.properties

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=SOEN345_Backend

# Resend Configuration
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:no-reply@soen345.local}

# Twilio Configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:c2VjdXJlLXRpY2tldC1yZXNlcnZhdGlvbi1qd3Qtc2VjcmV0LWtleS0yMDI2LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
